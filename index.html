<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e11d48;
            --primary-light: #fb7185;
            --primary-dark: #be123c;
            --bg: #fff1f2;
            --white: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 40px rgba(225, 29, 72, 0.15);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #fff1f2 0%, #ffe4e6 50%, #fecdd3 100%);
            min-height: 100vh;
            color: #881337;
            overflow-x: hidden;
        }

        /* Floating Hearts Background */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 20px;
            opacity: 0.3;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* Edit Mode Toggle */
        .edit-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .edit-toggle:hover {
            transform: scale(1.05);
        }

        .edit-toggle.active {
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 40px;
            position: relative;
            z-index: 10;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--primary-dark);
            opacity: 0.9;
        }

        /* Timer Section */
        .timer-section {
            background: var(--white);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            margin-bottom: 50px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .timer-label {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        .timer-display {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 10px;
        }

        .timer-sub {
            font-size: 1.2rem;
            color: var(--primary-dark);
            opacity: 0.8;
        }

        /* Gallery Section */
        .gallery-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-dark);
        }

        .upload-area {
            border: 3px dashed var(--primary-light);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.8);
            transform: scale(1.02);
        }

        .upload-area p {
            color: var(--primary-dark);
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .upload-area small {
            color: var(--primary-light);
        }

        #fileInput {
            display: none;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .photo-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .photo-caption {
            padding: 15px;
            text-align: center;
            color: var(--primary-dark);
            font-weight: 500;
            min-height: 50px;
        }

        .delete-photo {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0;
            transition: all 0.3s;
            color: var(--primary);
        }

        .photo-card:hover .delete-photo {
            opacity: 1;
        }

        /* Side Notes Panel */
        .notes-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--white);
            backdrop-filter: blur(20px);
            box-shadow: -10px 0 40px rgba(0,0,0,0.1);
            z-index: 999;
            transition: right 0.4s ease;
            padding: 100px 20px 20px;
            overflow-y: auto;
        }

        .notes-panel.open {
            right: 0;
        }

        .notes-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .notes-toggle:hover {
            transform: scale(1.1) rotate(10deg);
        }

        .add-note-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }

        .add-note-btn:hover {
            transform: translateY(-2px);
        }

        .note {
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            position: relative;
            min-height: 120px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .note-yellow { background: #fef3c7; color: #92400e; }
        .note-pink { background: #fce7f3; color: #9d174d; }
        .note-blue { background: #dbeafe; color: #1e40af; }
        .note-green { background: #d1fae5; color: #065f46; }
        .note-purple { background: #f3e8ff; color: #6b21a8; }

        .note-text {
            width: 100%;
            min-height: 80px;
            background: transparent;
            border: none;
            resize: none;
            font-family: inherit;
            font-size: 1rem;
            color: inherit;
            outline: none;
        }

        .note-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed rgba(0,0,0,0.2);
        }

        .color-btn {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.2);
        }

        .delete-note {
            margin-left: auto;
            background: rgba(255,255,255,0.5);
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            color: inherit;
            opacity: 0.7;
        }

        .delete-note:hover {
            opacity: 1;
            background: rgba(255,255,255,0.8);
        }

        .close-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
        }

        /* Editable Text Styles */
        .editable {
            position: relative;
            transition: all 0.3s;
            border-radius: 8px;
            padding: 5px;
        }

        .edit-mode .editable {
            cursor: text;
            border: 2px dashed var(--primary-light);
            background: rgba(255, 255, 255, 0.5);
        }

        .edit-mode .editable:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.8);
        }

        .edit-mode .editable:focus {
            outline: none;
            border-style: solid;
            background: white;
        }

        /* Overlay when panel is open */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 80px 15px 20px;
            }

            .notes-panel {
                width: 100%;
                right: -100%;
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .timer-section {
                padding: 30px 20px;
            }

            .edit-toggle {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
        }

        /* Empty State */
        .empty-gallery {
            text-align: center;
            padding: 60px 20px;
            color: var(--primary-light);
            font-size: 1.1rem;
        }

        .empty-gallery p {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- Floating Hearts -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- Edit Mode Toggle -->
    <button class="edit-toggle" id="editToggle" onclick="toggleEditMode()">
        <span>✏️</span>
        <span id="editText">Enable Edit Mode</span>
    </button>

    <!-- Notes Panel Toggle -->
    <button class="notes-toggle" id="notesToggle" onclick="toggleNotes()">📝</button>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="toggleNotes()"></div>

    <!-- Side Notes Panel -->
    <div class="notes-panel" id="notesPanel">
        <button class="close-panel" onclick="toggleNotes()">✕</button>
        <button class="add-note-btn" onclick="addNote()">+ Add New Note</button>
        <div id="notesContainer"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Hero -->
        <div class="hero">
            <h1 class="editable" data-key="heroTitle">My Love</h1>
            <p class="editable" data-key="heroSubtitle">Every day with you is a blessing</p>
        </div>

        <!-- Timer -->
        <div class="timer-section">
            <div class="timer-label editable" data-key="timerLabel">Together Since</div>
            <div class="timer-display" id="timer">0</div>
            <div class="timer-sub editable" data-key="timerSub">days of happiness</div>
        </div>

        <!-- Gallery -->
        <div class="gallery-section">
            <h2 class="section-title editable" data-key="galleryTitle">Our Memories</h2>
            
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <p>📸 Click or Drag & Drop Photos Here</p>
                <small>Add your beautiful memories</small>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*" onchange="handleFiles(this.files)">

            <div class="gallery-grid" id="galleryGrid">
                <div class="empty-gallery" id="emptyState">
                    <p>No photos yet 💕</p>
                    <p>Upload your first memory above!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const START_DATE = '2024-01-01'; // Change this to your date

        // State
        let editMode = false;
        let photos = JSON.parse(localStorage.getItem('photos') || '[]');
        let notes = JSON.parse(localStorage.getItem('notes') || '[]');
        let customText = JSON.parse(localStorage.getItem('customText') || '{}');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initHearts();
            initTimer();
            loadPhotos();
            loadNotes();
            loadCustomText();
            initDragDrop();
        });

        // Floating Hearts
        function initHearts() {
            const container = document.getElementById('heartsBg');
            const symbols = ['❤️', '💖', '💕', '💗', '💓'];
            
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 10 + 10) + 's';
                heart.style.animationDelay = Math.random() * 10 + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                container.appendChild(heart);
            }
        }

        // Timer
        function initTimer() {
            updateTimer();
            setInterval(updateTimer, 60000); // Update every minute
        }

        function updateTimer() {
            const start = new Date(START_DATE);
            const now = new Date();
            const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
            const hours = Math.floor((now - start) % (1000 * 60 * 60 * 24) / (1000 * 60 * 60));
            
            document.getElementById('timer').innerHTML = 
                `${diff}<span style="font-size:1.5rem; display:block; margin-top:0.5rem; color:var(--primary-dark); opacity:0.8">${hours} hours</span>`;
        }

        // Edit Mode
        function toggleEditMode() {
            editMode = !editMode;
            document.body.classList.toggle('edit-mode', editMode);
            
            const btn = document.getElementById('editToggle');
            const text = document.getElementById('editText');
            
            if (editMode) {
                btn.classList.add('active');
                text.textContent = 'Edit Mode ON';
                makeEditable();
            } else {
                btn.classList.remove('active');
                text.textContent = 'Enable Edit Mode';
                saveTextChanges();
            }
        }

        function makeEditable() {
            document.querySelectorAll('.editable').forEach(el => {
                el.contentEditable = true;
                el.addEventListener('blur', saveTextChanges);
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        el.blur();
                    }
                });
            });
        }

        function saveTextChanges() {
            document.querySelectorAll('.editable').forEach(el => {
                const key = el.dataset.key;
                if (key) {
                    customText[key] = el.textContent;
                }
            });
            localStorage.setItem('customText', JSON.stringify(customText));
        }

        function loadCustomText() {
            if (Object.keys(customText).length === 0) return;
            
            document.querySelectorAll('.editable').forEach(el => {
                const key = el.dataset.key;
                if (key && customText[key]) {
                    el.textContent = customText[key];
                }
            });
        }

        // Photo Gallery with Upload
        function initDragDrop() {
            const uploadArea = document.getElementById('uploadArea');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => {
                    uploadArea.classList.add('dragover');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => {
                    uploadArea.classList.remove('dragover');
                }, false);
            });

            uploadArea.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            }, false);
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const photo = {
                        id: Date.now() + Math.random(),
                        src: e.target.result,
                        caption: 'Click to edit caption'
                    };
                    photos.push(photo);
                    savePhotos();
                    renderPhoto(photo);
                };
                reader.readAsDataURL(file);
            });
        }

        function renderPhoto(photo) {
            const grid = document.getElementById('galleryGrid');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();

            const card = document.createElement('div');
            card.className = 'photo-card';
            card.dataset.id = photo.id;
            card.innerHTML = `
                <button class="delete-photo" onclick="deletePhoto(${photo.id})">🗑️</button>
                <img src="${photo.src}" alt="Memory">
                <div class="photo-caption editable" data-key="caption-${photo.id}" onclick="editCaption(${photo.id})">${photo.caption}</div>
            `;
            
            grid.appendChild(card);
            
            // Make caption editable if in edit mode
            if (editMode) {
                const caption = card.querySelector('.photo-caption');
                caption.contentEditable = true;
            }
        }

        function editCaption(id) {
            if (!editMode) return;
            
            const photo = photos.find(p => p.id === id);
            if (!photo) return;
            
            const newCaption = prompt('Edit caption:', photo.caption);
            if (newCaption !== null) {
                photo.caption = newCaption;
                savePhotos();
                loadPhotos();
            }
        }

        function deletePhoto(id) {
            if (!confirm('Delete this photo?')) return;
            photos = photos.filter(p => p.id !== id);
            savePhotos();
            loadPhotos();
        }

        function savePhotos() {
            localStorage.setItem('photos', JSON.stringify(photos));
        }

        function loadPhotos() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            if (photos.length === 0) {
                grid.innerHTML = `
                    <div class="empty-gallery" id="emptyState">
                        <p>No photos yet 💕</p>
                        <p>Upload your first memory above!</p>
                    </div>
                `;
                return;
            }
            
            photos.forEach(photo => renderPhoto(photo));
        }

        // Side Notes
        function toggleNotes() {
            document.getElementById('notesPanel').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function addNote() {
            const note = {
                id: Date.now(),
                text: '',
                color: 'note-pink'
            };
            notes.push(note);
            saveNotes();
            renderNote(note);
        }

        function renderNote(note) {
            const container = document.getElementById('notesContainer');
            
            const div = document.createElement('div');
            div.className = `note ${note.color}`;
            div.dataset.id = note.id;
            div.innerHTML = `
                <textarea class="note-text" placeholder="Write your note here..." onblur="updateNoteText(${note.id}, this.value)">${note.text}</textarea>
                <div class="note-controls">
                    <button class="color-btn note-yellow" onclick="changeNoteColor(${note.id}, 'note-yellow')" title="Yellow"></button>
                    <button class="color-btn note-pink" onclick="changeNoteColor(${note.id}, 'note-pink')" title="Pink"></button>
                    <button class="color-btn note-blue" onclick="changeNoteColor(${note.id}, 'note-blue')" title="Blue"></button>
                    <button class="color-btn note-green" onclick="changeNoteColor(${note.id}, 'note-green')" title="Green"></button>
                    <button class="color-btn note-purple" onclick="changeNoteColor(${note.id}, 'note-purple')" title="Purple"></button>
                    <button class="delete-note" onclick="deleteNote(${note.id})">Delete</button>
                </div>
            `;
            
            container.appendChild(div);
        }

        function updateNoteText(id, text) {
            const note = notes.find(n => n.id === id);
            if (note) {
                note.text = text;
                saveNotes();
            }
        }

        function changeNoteColor(id, color) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            note.color = color;
            saveNotes();
            
            const div = document.querySelector(`.note[data-id="${id}"]`);
            div.className = `note ${color}`;
        }

        function deleteNote(id) {
            if (!confirm('Delete this note?')) return;
            notes = notes.filter(n => n.id !== id);
            saveNotes();
            loadNotes();
        }

        function saveNotes() {
            localStorage.setItem('notes', JSON.stringify(notes));
        }

        function loadNotes() {
            const container = document.getElementById('notesContainer');
            container.innerHTML = '';
            notes.forEach(note => renderNote(note));
        }
    </script>
</body>
</html>
